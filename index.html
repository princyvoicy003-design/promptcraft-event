<!DOCTYPE html>
<html>
<head>
<title>PROMPTCRAFT</title>
<meta charset="UTF-8">

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}
h1 {
    padding:20px;
    font-size:42px;
    letter-spacing:4px;
}
button {
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    margin:15px;
}
#timer {
    font-size:26px;
    margin-top:15px;
}
.image-container {
    display:flex;
    justify-content:center;
    gap:60px;
    margin-top:40px;
    flex-wrap:wrap;
}
.image-box img {
    width:350px;
    border-radius:12px;
    border:4px solid white;
}
.label {
    margin-top:10px;
    font-weight:bold;
    letter-spacing:2px;
}
#submitSection {
    margin-top:40px;
    display:none;
}
#submitBtn {
    background:#16a34a;
}
</style>
</head>

<body>

<h1>PROMPTCRAFT</h1>

<button onclick="startChallenge()">Start Challenge</button>
<div id="timer"></div>

<div class="image-container">
    <div class="image-box">
        <img src="image1.png">
        <div class="label">IMAGE1</div>
    </div>
    <div class="image-box">
        <img src="image2.png">
        <div class="label">IMAGE2</div>
    </div>
</div>

<div id="submitSection">
    <button id="submitBtn" onclick="openForm()">Submit Your Work</button>
</div>

<script>

const TOTAL_TIME = 1800; // 30 min
let countdown;
let secretBuffer = "";

// Disable right click
document.addEventListener("contextmenu", e => e.preventDefault());

// Disable inspect shortcuts
document.addEventListener("keydown", function(e) {

    // Block F12
    if (e.key === "F12") e.preventDefault();

    // Block Ctrl+Shift+I / Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J"))
        e.preventDefault();

    // Block Ctrl+U
    if (e.ctrlKey && e.key === "u")
        e.preventDefault();

    // Block Ctrl+R
    if (e.ctrlKey && e.key === "r")
        e.preventDefault();

    // Hidden reset keyword
    secretBuffer += e.key.toLowerCase();
    if (secretBuffer.length > 20)
        secretBuffer = secretBuffer.slice(-20);

    if (secretBuffer.includes("resetcraft")) {
        clearInterval(countdown);
        localStorage.removeItem("startTime");
        document.getElementById("timer").innerHTML = "";
        document.getElementById("submitSection").style.display = "none";
        secretBuffer = "";
        alert("System Reset Successfully");
    }
});

function startChallenge() {

    if (!localStorage.getItem("startTime")) {
        localStorage.setItem("startTime", Date.now());
    }

    document.getElementById("submitSection").style.display = "block";
    runTimer();
}

function runTimer() {

    clearInterval(countdown);

    countdown = setInterval(function() {

        const startTime = localStorage.getItem("startTime");
        if (!startTime) return;

        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const remaining = TOTAL_TIME - elapsed;

        if (remaining <= 0) {
            clearInterval(countdown);
            document.getElementById("timer").innerHTML = "Time's Up!";
            return;
        }

        let minutes = Math.floor(remaining / 60);
        let seconds = remaining % 60;
        if (seconds < 10) seconds = "0" + seconds;

        document.getElementById("timer").innerHTML =
            "Time Left: " + minutes + ":" + seconds;

    }, 1000);
}

function openForm() {
    window.open(
        "https://docs.google.com/forms/d/e/1FAIpQLSc8oe7eHAKjE-FGOsaqUxDykT9Fpbx_JUfDyksmDugEAKV6XA/viewform?usp=header",
        "_blank"
    );
}

// Resume if refreshed
if (localStorage.getItem("startTime")) {
    document.getElementById("submitSection").style.display = "block";
    runTimer();
}

</script>

</body>
</html>
