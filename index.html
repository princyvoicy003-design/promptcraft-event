<!DOCTYPE html>
<html>
<head>
    <title>PROMPTCRAFT</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #111;
            color: white;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        h1 {
            font-size: 42px;
        }

        #timer {
            font-size: 32px;
            color: #00ffcc;
            margin: 20px 0;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin: 15px;
            background-color: #00ffcc;
        }

        .hidden {
            display: none;
        }

        img {
            width: 45%;
            max-width: 500px;
            margin: 10px;
            border-radius: 10px;
            pointer-events: none;
        }
    </style>
</head>

<body>

<h1>PROMPTCRAFT</h1>

<div id="timer">30:00</div>

<button id="startBtn" onclick="startEvent()">START</button>

<div id="eventContent" class="hidden">

    <h3>IMAGE1</h3>
    <img src="image1.png">

    <h3>IMAGE2</h3>
    <img src="image2.png">

    <br>

    <button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSc8oe7eHAKjE-FGOsaqUxDykT9Fpbx_JUfDyksmDugEAKV6XA/viewform?usp=header','_blank')">
        Open Google Submission Form
    </button>

</div>

<script>

let duration = 30 * 60; 
let timerInterval;
let secretCode = "";
let correctCode = "adminrestart";

/* ================= START EVENT ================= */

function startEvent() {

    document.getElementById("startBtn").classList.add("hidden");
    document.getElementById("eventContent").classList.remove("hidden");

    let endTime = Date.now() + duration * 1000;
    localStorage.setItem("endTime", endTime);

    runTimer();
}

/* ================= TIMER ================= */

function runTimer() {

    clearInterval(timerInterval);

    timerInterval = setInterval(function() {

        let endTime = localStorage.getItem("endTime");
        if (!endTime) return;

        let remaining = Math.floor((endTime - Date.now()) / 1000);

        if (remaining <= 0) {
            document.getElementById("timer").innerHTML = "TIME UP";
            clearInterval(timerInterval);
            localStorage.removeItem("endTime");
            return;
        }

        let minutes = Math.floor(remaining / 60);
        let seconds = remaining % 60;

        document.getElementById("timer").innerHTML =
            (minutes < 10 ? "0" : "") + minutes + ":" +
            (seconds < 10 ? "0" : "") + seconds;

    }, 1000);
}

/* ================= SECRET FULL RESET ================= */

document.addEventListener("keydown", function(e) {

    secretCode += e.key.toLowerCase();

    if (secretCode.length > correctCode.length) {
        secretCode = secretCode.substring(secretCode.length - correctCode.length);
    }

    if (secretCode === correctCode) {

        clearInterval(timerInterval);
        localStorage.removeItem("endTime");

        document.getElementById("timer").innerHTML = "30:00";

        document.getElementById("eventContent").classList.add("hidden");
        document.getElementById("startBtn").classList.remove("hidden");

        alert("Event Fully Reset");
    }
});

/* ================= SECURITY ================= */

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("selectstart", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());

document.addEventListener("keydown", function (e) {

    if (e.key === "F12") e.preventDefault();
    if (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) e.preventDefault();
    if (e.ctrlKey && ["u","s","p","r"].includes(e.key)) e.preventDefault();
    if (e.key === "F5") e.preventDefault();
});

</script>

</body>
</html>
